version: '3.8'

services:
  app:
    build: .
    container_name: aceest-fitness-app
    ports:
      - "5000:5000"
    volumes:
      - aceest-data:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  aceest-data:
    driver: local
