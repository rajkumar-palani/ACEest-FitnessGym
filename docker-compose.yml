version: '3.8'

services:
  backend:
    build: .
    container_name: aceest-fitness-backend
    ports:
      - "5000:5000"
    volumes:
      - aceest-data:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - aceest-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aceest-fitness-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - aceest-network

  nginx:
    image: nginx:alpine
    container_name: aceest-fitness-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - aceest-network

volumes:
  aceest-data:
    driver: local

networks:
  aceest-network:
    driver: bridge
