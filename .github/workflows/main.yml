name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app/app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 app/app.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Run Pytest tests
      run: |
        cd app
        pytest test_app.py -v --cov=app --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./app/coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t aceest-fitness:latest .
        docker build -t aceest-fitness:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run --rm aceest-fitness:latest python -c "from app import app; print('Flask app imported successfully')"

    - name: Run tests inside Docker
      run: |
        docker run --rm -w /app aceest-fitness:latest pytest test_app.py -v

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install pylint black isort

    - name: Check code formatting with black
      run: black --check app/app.py app/test_app.py
      continue-on-error: true

    - name: Check import sorting with isort
      run: isort --check-only app/app.py app/test_app.py
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install bandit safety

    - name: Run Bandit security scan
      run: bandit -r app/ -ll
      continue-on-error: true

    - name: Check dependencies for vulnerabilities
      run: safety check --file app/requirements.txt
      continue-on-error: true

  notify-success:
    needs: [build-and-test, docker-build]
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Success notification
      run: echo "✅ ACEest CI/CD Pipeline completed successfully!"
