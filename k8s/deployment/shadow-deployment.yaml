apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-primary
  labels:
    app: aceest-app
    track: primary
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-app
      track: primary
  template:
    metadata:
      labels:
        app: aceest-app
        track: primary
    spec:
      containers:
        - name: aceest-backend
          image: docker.io/rajswastik/aceest-fitness-backend:primary
          ports:
            - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app-shadow
  labels:
    app: aceest-app
    track: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-app
      track: shadow
  template:
    metadata:
      labels:
        app: aceest-app
        track: shadow
    spec:
      containers:
        - name: aceest-backend
          image: docker.io/rajswastik/aceest-fitness-backend:shadow
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-app
spec:
  selector:
    app: aceest-app
    track: primary
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  type: ClusterIP
# The shadow deployment is not selected by the primary service.
# Use service mesh traffic mirroring or proxy configuration to mirror production traffic to aceest-app-shadow.